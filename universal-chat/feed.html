<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Feed — NEXUS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/main.css">
</head>

<body>

    <div class="app-shell">
        <!-- Sidebar -->
        <aside class="sidebar" id="app-sidebar"></aside>

        <!-- Main content -->
        <div class="main-content">
            <header class="main-header">
                <button class="btn-icon" id="menu-toggle" style="display:none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <h2>Feed</h2>
                <button class="btn btn-ghost btn-sm" id="refresh-btn" title="Refresh">↻ Refresh</button>
            </header>

            <div class="page-body">
                <div class="feed-layout">

                    <!-- Center Feed Column -->
                    <div>
                        <!-- Stories -->
                        <div class="stories-row" id="stories-row">
                            <!-- Add Story button -->
                            <div class="add-story-btn" id="add-story-btn">
                                <div class="add-story-circle">
                                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
                                        fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"
                                        stroke-linejoin="round">
                                        <line x1="12" y1="5" x2="12" y2="19" />
                                        <line x1="5" y1="12" x2="19" y2="12" />
                                    </svg>
                                </div>
                                <span>Add story</span>
                            </div>
                            <div id="story-bubbles">
                                <!-- JS injected -->
                            </div>
                        </div>

                        <!-- Composer -->
                        <div class="card composer flex" id="composer-card">
                            <div id="composer-avatar"></div>
                            <div class="composer-input-wrap">
                                <textarea class="composer-textarea" id="composer-text"
                                    placeholder="What's on your mind?" rows="1"></textarea>
                                <div id="composer-media-preview"></div>
                                <div class="composer-actions">
                                    <label class="btn btn-ghost btn-sm" title="Photo" style="cursor:pointer">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16"
                                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                            stroke-linecap="round" stroke-linejoin="round">
                                            <rect x="3" y="3" width="18" height="18" rx="2" />
                                            <circle cx="8.5" cy="8.5" r="1.5" />
                                            <polyline points="21 15 16 10 5 21" />
                                        </svg>
                                        Photo
                                        <input type="file" id="post-media-input" accept="image/*,video/*" multiple
                                            style="display:none">
                                    </label>
                                    <div style="flex:1"></div>
                                    <button class="btn btn-primary btn-sm" id="post-submit-btn">Post</button>
                                </div>
                            </div>
                        </div>

                        <!-- Posts feed -->
                        <div id="posts-feed">
                            <!-- Skeletons while loading -->
                            <div id="feed-skeletons">
                                <div class="card" style="margin-bottom:16px">
                                    <div class="flex gap-3" style="margin-bottom:14px">
                                        <div class="skeleton skeleton-circle" style="width:44px;height:44px"></div>
                                        <div style="flex:1;display:flex;flex-direction:column;gap:7px;padding-top:4px">
                                            <div class="skeleton skeleton-text" style="width:130px"></div>
                                            <div class="skeleton skeleton-text-sm" style="width:80px"></div>
                                        </div>
                                    </div>
                                    <div class="skeleton skeleton-text" style="width:100%;margin-bottom:7px"></div>
                                    <div class="skeleton skeleton-text" style="width:75%"></div>
                                </div>
                                <div class="card" style="margin-bottom:16px">
                                    <div class="flex gap-3" style="margin-bottom:14px">
                                        <div class="skeleton skeleton-circle" style="width:44px;height:44px"></div>
                                        <div style="flex:1;display:flex;flex-direction:column;gap:7px;padding-top:4px">
                                            <div class="skeleton skeleton-text" style="width:130px"></div>
                                            <div class="skeleton skeleton-text-sm" style="width:80px"></div>
                                        </div>
                                    </div>
                                    <div class="skeleton skeleton-text" style="width:100%;margin-bottom:7px"></div>
                                    <div class="skeleton skeleton-text" style="width:75%"></div>
                                </div>
                                <div class="card" style="margin-bottom:16px">
                                    <div class="flex gap-3" style="margin-bottom:14px">
                                        <div class="skeleton skeleton-circle" style="width:44px;height:44px"></div>
                                        <div style="flex:1;display:flex;flex-direction:column;gap:7px;padding-top:4px">
                                            <div class="skeleton skeleton-text" style="width:130px"></div>
                                            <div class="skeleton skeleton-text-sm" style="width:80px"></div>
                                        </div>
                                    </div>
                                    <div class="skeleton skeleton-text" style="width:100%;margin-bottom:7px"></div>
                                    <div class="skeleton skeleton-text" style="width:75%"></div>
                                </div>
                            </div>
                        </div>

                        <!-- Infinite scroll sentinel -->
                        <div id="feed-sentinel" style="height:20px"></div>
                    </div>

                    <!-- Right sidebar -->
                    <div class="side-panel" id="side-panel">
                        <!-- Suggestions -->
                        <div class="card">
                            <div class="side-panel-title">Who to follow</div>
                            <div id="suggestions-list">
                                <div class="skeleton skeleton-text" style="margin-bottom:10px"></div>
                                <div class="skeleton skeleton-text" style="margin-bottom:10px"></div>
                                <div class="skeleton skeleton-text"></div>
                            </div>
                        </div>

                        <!-- Trending -->
                        <div class="card" id="trending-card">
                            <div class="side-panel-title">Trending now</div>
                            <div id="trending-list">
                                <p style="font-size:0.8rem">Loading trends...</p>
                            </div>
                        </div>
                    </div>

                </div>
            </div>
        </div>

        <!-- Mobile bottom nav -->
        <div class="bottom-nav" id="bottom-nav"></div>
    </div>

    <!-- Story upload modal -->
    <div id="story-modal" class="modal-overlay" style="display:none">
        <div class="card modal">
            <div class="modal-header">
                <h3>Add a Story</h3>
                <span class="modal-close" id="story-modal-close">✕</span>
            </div>
            <div style="margin-bottom:14px">
                <select class="input" id="story-kind" style="margin-bottom:10px">
                    <option value="story">Story (24hr)</option>
                    <option value="reel">Reel (video)</option>
                </select>
                <label class="btn btn-secondary w-full" style="width:100%;justify-content:center;cursor:pointer">
                    Choose media file
                    <input type="file" id="story-file-input" accept="image/*,video/*" style="display:none">
                </label>
                <textarea class="input mt-2" id="story-caption" placeholder="Add a caption..."
                    style="margin-top:10px"></textarea>
                <div id="story-preview" style="margin-top:10px"></div>
            </div>
            <button class="btn btn-primary w-full" id="story-submit-btn" style="width:100%">Share Story</button>
        </div>
    </div>

    <!-- Menu toggle shows on mobile via CSS, wire here -->
    <style>
        @media (max-width: 900px) {
            #menu-toggle {
                display: flex !important;
            }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/app.js"></script>
    <script src="js/feed.js"></script>
</body>

</html>
