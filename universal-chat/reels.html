<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reels — NEXUS</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="css/main.css">
    <style>
        .reels-page .main-content {
            background: var(--bg-void);
        }

        .reels-page .main-header {
            background: rgba(2, 2, 8, 0.7);
            border-color: rgba(255, 255, 255, 0.06);
        }

        .upload-reel-btn {
            position: fixed;
            bottom: 90px;
            right: 24px;
            z-index: 200;
            width: 52px;
            height: 52px;
            background: var(--grad-primary);
            border-radius: var(--r-full);
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
            box-shadow: 0 6px 20px var(--c-primary-glow);
            cursor: pointer;
            transition: transform var(--dur) var(--ease), box-shadow var(--dur) var(--ease);
        }

        .upload-reel-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 8px 28px var(--c-primary-glow);
        }
    </style>
</head>

<body class="reels-page">

    <div class="app-shell">
        <aside class="sidebar" id="app-sidebar"></aside>

        <div class="main-content">
            <header class="main-header">
                <button class="btn-icon" id="menu-toggle" style="display:none">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <line x1="3" y1="12" x2="21" y2="12" />
                        <line x1="3" y1="18" x2="21" y2="18" />
                    </svg>
                </button>
                <h2>Reels</h2>
            </header>

            <div class="reels-container" id="reels-container">
                <!-- Loading state -->
                <div id="reels-loading" style="height:60vh;display:flex;align-items:center;justify-content:center">
                    <div class="spinner"></div>
                </div>
            </div>
        </div>

        <div class="bottom-nav" id="bottom-nav"></div>
    </div>

    <!-- Upload reel FAB -->
    <div class="upload-reel-btn" id="upload-reel-btn" title="Upload a reel">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19" />
            <line x1="5" y1="12" x2="19" y2="12" />
        </svg>
    </div>

    <!-- Upload modal -->
    <div id="upload-reel-modal" class="modal-overlay" style="display:none">
        <div class="card modal">
            <div class="modal-header">
                <h3>Upload a Reel</h3>
                <span class="modal-close" id="upload-modal-close">✕</span>
            </div>
            <label class="btn btn-secondary w-full"
                style="width:100%;justify-content:center;cursor:pointer;margin-bottom:12px">
                Choose video or image
                <input type="file" id="reel-file-input" accept="image/*,video/*" style="display:none">
            </label>
            <textarea class="input" id="reel-caption" placeholder="Add a caption… #hashtags welcome"
                style="margin-bottom:12px"></textarea>
            <div id="reel-preview" style="margin-bottom:12px"></div>
            <button class="btn btn-primary" id="reel-upload-btn" style="width:100%">Share Reel</button>
        </div>
    </div>

    <style>
        @media (max-width: 900px) {
            #menu-toggle {
                display: flex !important;
            }

            .upload-reel-btn {
                bottom: 76px;
            }
        }
    </style>

    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.5/firebase-storage-compat.js"></script>
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/icons.js"></script>
    <script src="js/app.js"></script>
    <script src="js/reels.js"></script>
</body>

</html>
