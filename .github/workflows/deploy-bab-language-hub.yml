name: Deploy BAB Language Hub

on:
  push:
    branches:
      - master
    paths:
      - bab-language-hub/**
      - .github/workflows/deploy-bab-language-hub.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Prepare deployment folder
        run: |
          mkdir -p .deploy-pages
          rsync -av bab-language-hub/ .deploy-pages/ \
            --exclude node_modules \
            --exclude .git \
            --exclude .github \
            --exclude pwabuilder-output \
            --exclude dist \
            --exclude "*.log" \
            --exclude "*.runtime.json" \
            --exclude "tunnel.js"

      - name: Upload BAB Language Hub artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .deploy-pages

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
