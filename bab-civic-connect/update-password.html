<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Set New Password | BAB CivicConnect</title>

    <link rel="stylesheet" href="css/civicconnect.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <header class="site-header">
        <div class="header-inner container">
            <div class="brand">
                <img src="assets/images/civic-connect.png" class="brand-logo-circle" alt="Logo">
                <div class="brand-text">
                    <span class="brand-tagline">BAB CivicConnect</span>
                    <span class="brand-name">Update Password</span>
                </div>
            </div>
        </div>
    </header>

    <main class="section">
        <div class="container">
            <div class="form-card">
                <p class="eyebrow">SET NEW PASSWORD</p>
                <h1>Choose a new password</h1>

                <form id="updatePasswordForm" style="margin-top:1.4rem;">
                    <input id="newPassword" type="password" class="input-field" placeholder="New password" minlength="6"
                        required>
                    <button class="btn-primary" style="width:100%;">Update Password</button>
                </form>

                <div id="updatePasswordMessage" style="margin-top:0.8rem; font-size:0.85rem;"></div>

                <div class="form-footer">
                    <a href="login.html">Return to Login</a>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">© <span id="year"></span> BAB CivicConnect</div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
    <script src="js/civicconnect-auth.js"></script>
</body>

</html>
