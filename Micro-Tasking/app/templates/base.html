<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{ title }} | Micro-Tasking</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>

<body>
    <header class="site-header">
        <div class="container header-inner">
            <div>
                <p class="eyebrow">BAB Industries HQ Theme</p>
                <h1 class="brand-title">Micro-Tasking Command Center</h1>
            </div>
            <nav class="nav-links">
                <a href="{{ url_for('dashboard.index') }}">Dashboard</a>
                <a href="{{ url_for('tasks.task_list') }}">Tasks</a>
                <a href="{{ url_for('earnings.earnings_page') }}">Earnings</a>
                <a href="{{ url_for('settings.settings_page') }}">Settings</a>
            </nav>
        </div>
    </header>

    <main class="container page-shell">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
