<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | BAB Driver App</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <header class="site-header">
        <a class="brand" href="index.html">
            <img src="images/bab-driver-app-logo.png" alt="BAB Driver App logo">
            <span>BAB Driver App</span>
        </a>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="earn.html">Earn</a>
            <a href="login.html">Login</a>
            <a class="btn btn-small" href="signup.html">Sign Up</a>
        </nav>
    </header>

    <main class="container page">
        <section class="card">
            <h1>Contact Us</h1>
            <p>Email: support@babdriverapp.com</p>
            <p>Phone: +27 00 000 0000</p>

            <form>
                <label for="contactName">Name</label>
                <input id="contactName" type="text" required>

                <label for="contactMessage">Message</label>
                <textarea id="contactMessage" rows="5" required></textarea>

                <button class="btn" type="submit">Send Message</button>
            </form>
        </section>
    </main>

    <script src="script.js"></script>
</body>

</html>
